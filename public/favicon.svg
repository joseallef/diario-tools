<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AssinarPDF">
  <defs>
    <linearGradient id="badge" x1="10" y1="6" x2="54" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2dd4bf"/>
      <stop offset="0.48" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="sheet" x1="32" y1="14" x2="32" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0fdfa"/>
    </linearGradient>
  </defs>

  <!-- Badge -->
  <circle cx="32" cy="32" r="30" fill="url(#badge)"/>
  <!-- Soft specular highlight -->
  <ellipse cx="23" cy="20" rx="13" ry="9" fill="#ffffff" opacity="0.16"/>
  <!-- Inner rim -->
  <circle cx="32" cy="32" r="28.25" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.25"/>

  <!-- Document sheet (safe inset — never touches the circle edge) -->
  <rect x="20.5" y="14.5" width="23" height="31" rx="2.75" fill="url(#sheet)"/>
  <!-- Folded corner -->
  <path d="M36.5 14.5v7.25h7.25Z" fill="#ccfbf1"/>
  <path d="M36.5 14.5v7.25h7.25" fill="none" stroke="#5eead4" stroke-width="0.9" stroke-linejoin="round"/>

  <!-- Subtle body lines -->
  <g stroke="#99f6e4" stroke-width="1.75" stroke-linecap="round">
    <path d="M25.5 24.5h11.5"/>
    <path d="M25.5 29h13"/>
    <path d="M25.5 33.5h8.5"/>
  </g>

  <!-- Signature stroke -->
  <path
    d="M24.5 41c3.6-4.6 7.4-4.8 10.4 0 2.2 3.4 5.8 2.8 8-1.6"
    fill="none"
    stroke="#0f766e"
    stroke-width="2.1"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Pen tip at the end of the signature -->
  <path
    d="M42.2 37.6 45.4 34.8a1.15 1.15 0 0 1 1.6 1.6l-2.8 3.2-2.35-.65Z"
    fill="#0f766e"
  />
</svg>
